<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Website Redirect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #000000;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    .center-image {
      width: 60px;
      height: auto;
    }

    .redirect-text {
      margin-top: 16px;
      color: #ffffff;
      font-family: sans-serif;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <img class="center-image" src="loading-dark.gif" alt="Redirecting">
    <p class="redirect-text">Redirecting to my website.</p>
  </div>

  <script>
    setTimeout(function () {
      window.location.href = "https://notjustmaps.myportfolio.com/";
    }, 3000);
  </script>

</body>
</html>
